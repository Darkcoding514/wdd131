<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
<!-- Open Graph (Facebook, LinkedIn, etc.) -->
<meta property="og:type" content="website">
<meta property="og:title" content="Recipes Book">
<meta property="og:description" content="Search for you recipes in one large collection!">
<meta property="og:url" content="Your URL">
<meta property="og:image" content="images/socialpreview.png">

<!-- X Card -->
<meta name="twitter:card" content="Social Preview Image">
<meta name="twitter:title" content="Recipes Book">
<meta name="twitter:description" content="Search for you recipes in one large collection!">
<meta name="twitter:image" content="images/socialpreview.png">

<!-- One favicon (ICO works everywhere) -->
<link rel="icon" href="images/favicon.ico">

<!-- One Apple Touch Icon (iOS home screen) -->
<link rel="apple-touch-icon" href="images/appleicon.png">

    <title>Recipe Book</title>
    <link rel="stylesheet" href="recipes.css">

</head>
<body>
    
    <header>
        <img src="images/recipe-book.png" alt="Recipe Book Logo">
        <h1>recipe-book</h1>
    </header>
    
    <div id="middlebody">
    
        <div id="searchbar">
            <input type="text" name="search" placeholder="Find a recipe">
            <div id="search_icon">
                <hr class="vertical_hr">
                <button><img src="images/search.svg" alt="Search Button"></button>
            </div>
        </div>
        <hr>




        <div class="recipe_review">
            <img src="images/apple-crisp.jpg" alt="Bowl of Apple Crisp">
            <div class="recipe_info">
                <div class="tag"><h3>dessert</h3></div>
                <h2>APPLE CRISP</h2>
                


                <span
                class="rating"
                role="img"
                aria-label="Rating: 4 out of 5 stars">

                    <span aria-hidden="true" class="icon-star">⭐</span>
                    <span aria-hidden="true" class="icon-star">⭐</span>
                    <span aria-hidden="true" class="icon-star">⭐</span>
                    <span aria-hidden="true" class="icon-star">⭐</span>
                    <span aria-hidden="true" class="icon-star-empty">☆</span>
                </span>

                <p>This apply crisp recipe is a simple yet delicious fall dessert that's great served warm with vanilla ice cream.</p>

            </div>
        </div>



        <div id="lowerbody">
            <div class="social">
                <!-- Social media icons provided under CC from https://www.iconfinder.com/AlfredoCreates  -->
                <a href="#"><img src="images/instagram_icon.svg" alt="instagram icon"></a>
                <a href="#"><img src="images/youtube_icon.svg" alt="youtube icon"></a>
                <a href="#"><img src="images/pinterest_icon.svg" alt="pinterest icon"></a>
            </div>                  

            <footer>
                <a href="https://www.flaticon.com/free-icons/recipe" title="recipe icons">Recipe icons created by Freepik - Flaticon</a>               
            </footer>
        </div>
    </div>
</body>
</html>
