<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Ticket Form</title>
    <script src="eventform.js" defer></script>
    <link rel="stylesheet" href="evenform.css">
</head>
<body>
    
    <div id="eventbox">
        <h1>Event Ticket</h1>
        <form id="ticketForm">
            <div class="field">
                <label for="firstName">First Name</label>
                <input id="firstName" name="firstName" type="text" required />
            </div>
            
            <div class="field">
                <label for="lastName">Last Name</label>
                <input id="lastName" name="lastName" type="text" required />
            </div>

            <div class="widefield">
                <label for="email">Email</label>
                <input id="email" name="email" type="text" required />
            </div>

            <div class="field">
                <label for="ticketType">Type</label>
                <select id="ticketType" name="ticketType" aria-controls="notesContainer" required>
                <option value="">Choose one</option>
                <option value="discount">Student</option>
                <option value="normal">Guest</option>
                </select>
            </div>


        </form>
    </div>



</body>
</html>
