<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <meta property="og:type" content="RPG">
    <meta property="og:title" content="Character Card">
    <meta property="og:description" content="Build and Play with your character!">
    <meta property="og:url" content="https://yourURLofPage.here">
    <meta property="og:image" content="https://yourURLofSocialPreviewImageHere.png">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Character Card">
    <meta name="twitter:description" content="Build and Play with your character!">


    <!-- change this bruh \/ -->
    <meta name="twitter:image" content="https://andejuli.github.io/wdd131/character_card/snortleblat.webp">

    
    <!-- One favicon (ICO works everywhere) -->
    <link rel="icon" href="/favicon.ico">

    <!-- One Apple Touch Icon (iOS home screen) -->
    <link rel="apple-touch-icon" href="/images/apple-touch-icon.png">

    <link rel="stylesheet" href="charactercard.css">
    <script src="charactercard.js" defer></script>

    <title>Character Card</title>
</head>
<body>


    <div class="card">
        <img class="image" src="https://andejuli.github.io/wdd131/character_card/snortleblat.webp" alt="Snortleblat in a swamp">
        <div class="name">Snortleblat</div>
        <div class="stats">
            <p>Class: <br>
                Level: <br>
                Health: <br>
            </p>
        </div>
        <div class="buttons">
            <button class="atk_button">Attacked</button>
            <button class="lvl_button">Level Up</button>
        </div>
    </div>
