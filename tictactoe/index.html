<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="styles/tictactoe.css">
    <script defer src="tictactoe.js"></script>

</head>

<body>

    <header>

        <div id="headerdisplay">
            <img id="icon" src="images/tic-tac-toe-icon.ico" alt="Tic Tac Toe Icon">
            <h1>Tic Tac Toe</h1>
        </div>

        <nav>
            <a href="index.html">Home</a>
            <a href="index.html">About</a>
        </nav>
    </header>

    
    <main>
        
    
        <div id="gameboard">
            <div class="boardsquare">
                <button class="square" aria-label="Board square 1"></button>
            </div>
            <div class="boardsquare">
                <button class="square" aria-label="Board square 2"></button>
            </div>
            <div class="boardsquare">
                <button class="square" aria-label="Board square 3"></button>
            </div>
            <div class="boardsquare">
                <button class="square" aria-label="Board square 4"></button>
            </div>
            <div class="boardsquare">
                <button class="square" aria-label="Board square 5"></button>
            </div>
            <div class="boardsquare">
                <button class="square" aria-label="Board square 6"></button>
            </div>
            <div class="boardsquare">
                <button class="square" aria-label="Board square 7"></button>
            </div>
            <div class="boardsquare">
                <button class="square" aria-label="Board square 8"></button>
            </div>
            <div class="boardsquare">
                <button class="square" aria-label="Board square 9"></button>
            </div>
        </div>
        <div id="lowermain">
            <p id="turnstatus" aria-live="polite">Turn: </p>
            <button id="resetbutton">Reset</button>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Jonathan's Tic Tac Toe Game</p>
        <a target="_blank" href="app-plan.html">App Plan</a>
        <!-- <a href="">Contact Us</a> -->
    </footer>
    



</body>
</html>
